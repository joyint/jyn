description: 'Wire the shared signing action from the umbrella epic JI-00F4-20 into jyn''s release CI to produce signed jyn.exe artifacts for tagged releases (Authenticode via Microsoft Trusted Signing). Add a workflow that opens a PR to microsoft/winget-pkgs with an updated manifest pointing at the signed artifact when a release is published. Motivation: CyberArk and similar EPM scanners quarantine unsigned binaries, blocking enterprise installs.'
