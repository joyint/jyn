  text: 'Plan: Mirror joy''s Windows signing into jyn using the same shared signing identity (account joydevsign, cert profile joydevPublicTrust). Steps: copy the composite action .github/actions/sign-windows-exe; add id-token: write + environment: release + the sign-then-re-archive steps to release.yml; add winget-submit.yml (identifier joyint.jyn, PackageName jyn, fork-user joyint). Azure already prepared: federated credential repo:joyint/jyn:environment:release on the shared Entra app, signer role is account-wide, jyn repo secrets set. First joyint.jyn WinGet entry happens at jyn''s first signed release. Mirrors JOY-0190-D0; epic JI-00F4-20.'
