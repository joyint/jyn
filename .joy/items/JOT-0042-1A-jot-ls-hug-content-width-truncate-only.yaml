  text: '[x] Implemented: ls now hugs content width by default. TITLE column = max(longest title, ''TITLE'') + 5 trailing spaces; DESC/ASSIGNEE/TAGS lay flush to its right. Separators and frame shrink with the table so wide terminals don''t show a wall of whitespace. If the natural table exceeds the terminal, the layout falls back to filling the full width and truncates the title with ''...'' plus a 2-space buffer before the next column (Joy-style). bats scenario confirms both directions.'
