description: 'Default ls currently stretches the TITLE column to fill the terminal, so wider terminals look empty next to short task titles. Change the layout: compute natural content widths, pad TITLE to max(longest title, ''TITLE'') + 5, lay out DESC/ASSIGNEE/TAGS flush to the right of that. Only when the natural table width exceeds the terminal, fall back to Joy-style title truncation (''...'' plus a 2-space buffer) to fit.'
