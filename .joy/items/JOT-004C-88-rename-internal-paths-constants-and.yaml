description: 'Phase 1 of the jot -> jyn rename. Flip all user-visible and storage-layer identifiers. Changes: (1) crates/jyn-core/src/storage.rs: const JOT_DIR = ''.jot'' -> const JYN_DIR = ''.jyn''; rename constant and all usages. (2) crates/jyn-core/src/config.rs: config paths ''~/.config/jot/'' -> ''~/.config/jyn/'', ''$XDG_CONFIG_HOME/jot/'' -> ''/jyn/'', ''./.jot/config.yaml'' -> ''./.jyn/config.yaml''. Update doc comments. (3) crates/jyn-cli/src/main.rs: env var JOT_SHORT -> JYN_SHORT (rename reader); docs string ''https://joyint.com/en/jot/docs'' -> ''/jyn/docs''. (4) crates/jyn-cli/src/commands/config.rs: help text and docstrings referring to jot config paths. (5) CLI help text everywhere that mentions ''jot''. No backwards-compatibility fallback for old .jot/ dir or JOT_ env vars - hard cut per epic decision.'
