description: "jyn has no comment command today and does not display comments, although the joy-core Item that Task wraps already carries comments: Vec<Comment> (author, date, text, edits). Add a jyn comment command and surface comments in jyn show. It must be occurrence-aware from the start (do not build series-only and rework later):\n\n- jyn comment #1 \"...\"  -> a series-level comment (Item.comments on the task).\n- jyn comment #1@2026-04-13 \"...\"  -> a comment on that specific occurrence.\n\nThis ties into the recurring-task override model (JYN-000A-B1): a recurring task is one item, so its Item.comments are inherently series-level; per-occurrence comments must live on the occurrence override entry. Therefore the occurrence override is a per-occurrence overlay (completion + comments + possibly per-instance changes), not just {date, completed_at}; reserve a comments field on override entries in the completion schema so we do not churn it later.\n\nKey use case: dispatched AI jobs that run on a schedule post their per-run result as a comment on that runs occurrence (so result is bound to the occurrence, not lost in a shared series list).\n\nDisplay: jyn show #1 lists series comments plus per-occurrence comments under each occurrence.\n\nSync mapping: series comments -> VTODO master DESCRIPTION/COMMENT and MS To Do body; per-occurrence comments -> the RECURRENCE-ID override component DESCRIPTION/COMMENT. \n\nReopen behaviour must define what happens to an occurrence comment when that occurrence is reopened (remove with the override vs keep). Relates to JYN-000A-B1; do after the completion round (JOT-000A)."
