description: 'jyn ships the bats integration harness (just test-int plus the CI Integration job) but the new commands lack coverage. Add per-feature bats files matching the existing style: tutorial (renders, key chapters present, --help), update (managed-by-another-installer path and exit code on a non-cargo-dist build, --check, --help), and workspace resolution (add in root, list from a nested subdirectory finds the same workspace, footer shows the resolved .jyn path; an unrelated directory falls back to the onboarding screen). Covers JYN-0005-90, JYN-0004-E6, and JYN-0007-61.'
