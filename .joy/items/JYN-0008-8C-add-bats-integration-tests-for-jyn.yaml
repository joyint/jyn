  text: 'Plan: Add three bats files under tests/integration matching the existing load setup style. tutorial.bats: jyn tutorial exits 0 and renders the H1 plus key chapters (Capturing Tasks, Where Jyn Stores Your Tasks, Configuration), and jyn tutorial --help mentions the command. update.bats: on a non-cargo-dist dev build jyn update and jyn update --check report managed by another installer and exit 0, and --help lists --check. workspace.bats: add a task in the root, then list from a nested subdirectory and confirm the same task and a .jyn path in the footer (upward search); a fresh unrelated dir shows the onboarding block. Run via bats tests/integration/*.bats.'
