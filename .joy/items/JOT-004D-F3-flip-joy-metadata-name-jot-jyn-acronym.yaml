description: 'Phase 1 of the rename, depends on JOY-00F1-AD (''joy project set acronym'' CLI in joy submodule). Changes in jot/.joy/project.yaml: name ''jot'' -> ''jyn''; acronym ''JOT'' -> ''JYN''; version-files paths crates/jot-core/Cargo.toml -> crates/jyn-core/Cargo.toml and crates/jot-cli/Cargo.toml -> crates/jyn-cli/Cargo.toml. Commands: ''joy project set name jyn'' and ''joy project set acronym JYN'' (requires JOY-00F1-AD to ship first) and ''joy project set version-files ...'' or direct update of the list. Existing JOT-xxxx items keep their IDs as historical record; new items auto-prefix JYN-xxxx. After this, rename the project directory reference in umbrella .gitmodules (handled by JI-00E7-A2).'
comments:
- author: ai:claude@joy
  date: 2026-04-19T20:13:02.740269692Z
  text: |-
    Plan:
    1. Rename .joy physical directory in this jot submodule from .jot to the conventional layout - no, wait, .joy is a different directory. Our tasks live under .jot -> .jyn, but backlog items live under .joy (Joy's own folder) which stays .joy regardless of product name.
    2. Update jot/.joy/project.yaml fields:
       - name: jot -> jyn
       - acronym: JOT -> JYN
    3. Use joy's new acronym-set CLI (JOY-00F1-AD): joy project set name jyn, joy project set acronym JYN.
    4. joy-version-files list (if present) still points at crates/jot-* in the yaml - update to crates/jyn-*. If joy project set does not expose version-files via CLI, bail out and note.
    5. Verify joy project output shows new name + acronym.
    6. Commit .joy/project.yaml on rename/jyn with ref JOT-004D-F3.

    Out of scope: renaming existing JOT-xxxx items, which stay as historical record per the umbrella-level strategy (new items get JYN-xxxx automatically once the acronym is flipped).
- author: ai:claude@joy
  date: 2026-04-19T20:19:52.166533928Z
  text: |-
    [x] Done. Commit d48f7bb. name: jot -> jyn, acronym JOT -> JYN via joy project set (required JOY-00F1-AD; user invoked locally built joy since installed version pre-dates the feature). Existing JOT-xxxx items keep historical prefix; new items use JYN-xxxx.

    Two follow-up bugs surfaced during the flip and will be filed in JOY when Phase 1 wraps: (1) acronym rename orphans the local delegation private key directory (~/.local/state/joy/delegations/<acronym>/ path contains the old acronym, joy can't find the key under the new name); (2) joy ai rotate is referenced in ADR-033 §1 and in error messages but the subcommand is not implemented.
