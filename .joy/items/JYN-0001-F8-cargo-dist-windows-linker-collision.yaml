  date: 2026-04-19T22:19:33.327178895Z
  text: '[x] crates/jyn/Cargo.toml: added [package.metadata.dist] dist = false with explanatory comment. Alias crate continues to publish to crates.io for ''cargo install jyn''; prebuilt binaries on GitHub come exclusively from jyn-cli.'
