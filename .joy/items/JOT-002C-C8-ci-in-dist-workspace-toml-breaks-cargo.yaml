created: 2026-04-13T21:52:10.281540036Z
updated: 2026-04-13T21:52:20.980210030Z
description: 'Setting ''ci = []'' in dist-workspace.toml was meant to only disable ''dist generate'' from re-creating release.yml. But cargo-dist commands at runtime (''dist host --steps=create'' inside the workflow) also read this config and panic with ''couldn''t find the release!?'' when ci is empty. Result: every release.yml run since the change failed in the plan step, leaving GitHub releases without binary assets and breaking get.joyint.com/jot. Fix: revert ci to ''github'' and rely on a strong comment plus team discipline to never run ''dist generate'' (which would overwrite the patched ''Create or update GitHub Release'' step).'
comments:
