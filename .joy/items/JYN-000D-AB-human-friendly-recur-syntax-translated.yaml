description: 'Today --recur takes a raw RFC 5545 RRULE string (FREQ=WEEKLY;BYDAY=MO), which is the storage/sync format and not what a human types. Add a human-syntax parser as the default user input that translates common recurrence phrases to an RRULE for internal storage (so VTODO/Graph mapping stays lossless). Raw RRULE keeps working as a power-user fallback. Minimum default phrases to cover (TDD-first, new bats spec): daily / weekly / monthly / yearly / hourly; every <weekday> (every Monday, every Mon); weekdays; every N (days|weeks|months|years|hours); on a day-of-month (monthly on the 1st); count (... for N times) and until (... until 2026-12-31). After the parser lands, retire the raw-RRULE examples from the tutorial and document the human form; the existing raw-RRULE bats tests stay as advanced-path coverage.'
comments:
- author: ai:claude@joy delegated-by:horst.schwarz@joydev.com
  date: 2026-05-27T17:06:15.443819Z
  text: 'Plan (TDD): write a bats spec covering the human --recur phrases (skip-disarmed, armed as each lands). Implement a parse_recur_input layer that translates human input to RRULE and stores the RRULE, with raw RRULE strings passing through as the power-user fallback. Coverage: daily/weekly/monthly/yearly/hourly; every <weekday>; weekdays; every N <unit>; monthly on the Nth; for N <unit>/for N times; until DATE; raw RRULE fallback; error on gibberish. After green: retire the RRULE strings from the tutorial and replace with human examples.'
