  text: 'Plan: add foreign_install() (winget/cargo/other, joyint.jyn, jyn-cli) gated on missing receipt; in run + run_check print ''managed by <mgr>'' plus ''upgrade with: <cmd>''. jyn update is binary-only, so no managed-files line. Update bats to also assert the upgrade command.'
