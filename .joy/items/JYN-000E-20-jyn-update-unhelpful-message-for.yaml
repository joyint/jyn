description: 'Mirror of the joy fix: when jyn has no axoupdater receipt (foreign install, e.g. winget) ''jyn update'' only says ''managed by another installer''. Infer the manager from the binary path and print the exact upgrade command (winget: ''winget upgrade -s winget joyint.jyn''; cargo: ''cargo install jyn-cli''). jyn update is binary-only (no managed-files sync), so the message omits the re-sync line. Inform-only; jyn never runs the foreign manager.'
