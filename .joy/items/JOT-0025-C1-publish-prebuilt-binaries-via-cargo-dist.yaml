description: |-
  ## Goal

  Ship prebuilt Jot binaries on GitHub releases so users can install via a
  one-line shell command instead of going through ``cargo install``.

  ## Approach

  Use [cargo-dist](https://axodotdev.github.io/cargo-dist/) (the Rust
  community's standard for this, also used by ruff, uv, oxc). It generates
  a GitHub Actions release workflow and shell/PowerShell installer scripts
  that live next to the release assets on GitHub.

  ### Scope

  1. Add cargo-dist config to ``Cargo.toml`` (workspace metadata).
  2. Generate the release workflow with ``cargo dist init`` and adjust for
     repo conventions (PR-based release, signed tags etc.).
  3. Build targets: Linux x86_64 + aarch64, macOS x86_64 + aarch64, Windows
     x86_64.
  4. Installer artifacts produced per release:
     - ``jot-installer.sh`` (bash)
     - ``jot-installer.ps1`` (PowerShell)
     - Raw tarballs / zips per target triple
  5. Verify via a prerelease tag that the workflow produces all artifacts
     and that ``curl -fsSL
     github.com/joyint/jot/releases/latest/download/jot-installer.sh | sh``
     actually installs the correct binary.
  6. Document the new install command in Jot's README and CONTRIBUTING.

  ### Out of scope

  - ``get.joyint.com`` vanity domain (tracked in the website backlog).
  - Installing docs update on joyint.com (tracked in the website backlog).

  ## Acceptance

  - Tagging a release triggers the workflow.
  - ``jot-installer.sh`` on the release page installs Jot into
    ``~/.local/bin`` (or equivalent) on Linux / macOS.
  - README mentions the new one-liner as primary install method,
    ``cargo install jot-cli`` retained as alternative.
