description: 'Test ''due rendering: full year on ISO dates so 2026 and 2027 differ'' uses 2026-04-24 which falls within the current week when run in mid-April 2026. Jot renders near-future dates as weekday labels (Fri) instead of full ISO, so the assertion fails. Fix: use far-future dates that always get full ISO rendering.'
