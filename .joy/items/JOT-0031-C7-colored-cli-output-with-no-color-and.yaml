  text: '[x] Implemented: --color=auto|always|never global flag, NO_COLOR env respected, stdout TTY detection. Semantic helpers in jot-cli::color (label, id, success, danger) using the same SECONDARY/SUCCESS/DANGER ANSI palette as joy-cli. Auto disables when piped. Three new bats cases: --color=never strips escapes, --color=always keeps them when piped, NO_COLOR=1 disables without the flag.'
