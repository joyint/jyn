  text: 'Plan: extend jyn-core due::parse_due to accept weekday names (monday..sunday and mon..sun, optional next prefix) resolving to the next future occurrence (never today), plus relative offsets (+Nd / +Nw, leading + optional) added to today. Hand-rolled with chrono, no new dependency (dependency-minimalism). Update the error message and module doc, add unit tests, run just check. Time-of-day reminder offsets (1d/2h) stay with JOT-0034.'
