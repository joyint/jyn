  text: '[x] Extended jyn-core due::parse_due with weekday names (monday..sunday and mon..sun, optional next prefix; always the next future occurrence, never today) and relative offsets (+Nd/Nd, +Nw/Nw; negatives and missing units rejected). Hand-rolled with chrono, no new dependency. Updated the module doc and error hint; added unit tests for weekdays/offsets/rejections. Integration: updated the bats test that assumed friday is rejected (it is now valid) and added a test that add accepts fri/next monday/+3d/2w. just check is green (fmt, clippy -D warnings, unit + 69 bats). Note: just check also caught a latent rustfmt violation in commands/update.rs from JOT-0004 that a piped --check had masked; fixed by cargo fmt.'
