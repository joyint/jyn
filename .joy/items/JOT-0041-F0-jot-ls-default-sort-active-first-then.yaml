  text: '[x] Added --sort mode flag (smart/created/updated/priority/due/title) and --reverse/-r. Ls flags (including --all/-a, --sort, --tag, --due, --closed, --archived) are now flattened into the top-level Cli so ''jot -a'', ''jot --sort title'', ''jot --tag work'' work without typing ''ls''. Full subcommand path ''jot ls --sort title'' still works. --short keeps its -s; --sort is long-only. bats grows two scenarios for top-level flags and each sort mode.'
