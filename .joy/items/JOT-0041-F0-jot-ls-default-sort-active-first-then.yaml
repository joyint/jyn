  text: '[x] Default ls sort implemented via sort_key tuple (archived, closed, urgency, priority, created). What-should-I-do-next floats to the top: overdue -> today -> soon (this week) -> later -> no-date. Priority breaks ties. Creation order stabilises the rest. Active first, closed after, archived last. bats scenario asserts the canonical ordering across eight tasks.'
