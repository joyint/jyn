description: 'Sort ls output so the task a user should work on next floats to the top. Primary key: active tasks before closed, non-archived before archived (only relevant with --all). Secondary: due-date urgency (overdue, today, soon this week, later, no-date). Tertiary: priority (extreme, critical, high, medium, low). Final tiebreak: creation order (older first). A --sort flag for alternative orders (created, updated, title, due, priority) can follow later.'
