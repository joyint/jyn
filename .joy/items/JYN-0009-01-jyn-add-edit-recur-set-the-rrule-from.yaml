description: 'No CLI path sets a tasks recurrence today: the jyn-core Task has a recurrence: Option<String> (RFC 5545 RRULE) field, but neither jyn add nor jyn edit exposes it. Add a --recur flag to add and edit that accepts an RRULE string (e.g. FREQ=WEEKLY;BYDAY=MO), validated via the rrule crate, plus --no-recur on edit to clear it. Part of the recurrence end-to-end work alongside JOT-0005 (model), JOT-0006 (next-occurrence), and JOT-000A (done handling).'
