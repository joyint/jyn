description: 'Phase 1 of the jot -> jyn rename (see JI-00E3-C5 in umbrella). Rename Cargo workspace and all Rust module/package identity. Changes: (1) Cargo.toml workspace members: crates/jot-core -> crates/jyn-core, crates/jot-cli -> crates/jyn-cli. (2) crates/jot-core/Cargo.toml: name = jyn-core, repository = https://github.com/joyint/jyn, homepage = https://joyint.com/en/jyn. (3) crates/jot-cli/Cargo.toml: name = jyn-cli, default-run = jyn, [[bin]] name = jyn, dependency jot-core -> jyn-core. (4) Rename source directories crates/jot-core -> crates/jyn-core and crates/jot-cli -> crates/jyn-cli (git mv). (5) All Rust ''use'' paths and extern crate names: jot_core -> jyn_core. (6) Re-export / lib re-name if applicable. Work on branch rename/jyn. Verify with ''cargo build --workspace'' and ''cargo test --workspace'' before merge.'
