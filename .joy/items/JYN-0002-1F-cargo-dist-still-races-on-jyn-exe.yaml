description: 'v0.6.1 hotfix (JYN-0001-F8) added ''[package.metadata.dist] dist = false'' to the alias crate expecting it to exclude the crate from cargo-dist''s build. It does exclude it from the artifact plan, but cargo-dist still runs a single workspace-wide ''cargo build'' which compiles both jyn-cli (bin jyn) and jyn (bin jyn) in parallel, racing on target/.../jyn.exe on Windows (LNK1104). Fix: add ''precise-builds = true'' to [dist] in dist-workspace.toml so cargo-dist compiles each package individually with ''cargo build -p <pkg>''.'
comments:
