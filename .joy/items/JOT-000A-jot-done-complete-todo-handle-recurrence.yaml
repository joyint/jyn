  text: '[x] Wired the CLI for date-only recurring completion: run_close calls Task::complete_occurrence; Advanced advances and prints done #1 ... next DATE, Ended prints closed #1 ... recurrence complete; close on an already-closed task fails. run_reopen #1@DATE removes that single override and reactivates the series. jyn ls --closed/--all synthesises read-only occurrence rows as #1@DATE; jyn show lists Completed occurrences. Armed bats tests 1-4. just check green. Hourly/sub-day (test 5) is the time-capable Due model in a follow-on item.'
