  date: 2026-05-21T22:07:35.821056Z
  text: 'Plan (TDD): write bats integration tests first to fix the default recurring-completion CLI commands, then implement to green. Scope now: date-only recurrence (the common case, fits the current date-only due model and a forward-compatible completed_occurrences schema); time-bearing/sub-day and DST per JYN-000A-B1 are a follow-on, no edge cases yet. Default commands to specify: jyn done on a recurring task records the completed occurrence and advances (stays open); jyn ls --closed shows the occurrence as #1@DATE; jyn show lists completed occurrences; jyn reopen #1@DATE removes it and rolls due back; completing the final occurrence (exhausted RRULE) closes the series for real. Core advance+override logic is JOT-0006.'
