  date: 2026-05-21T20:23:40.321110Z
  text: 'Plan: add a jyn-core recurrence module backed by the rrule crate (0.14, full RFC 5545; user-approved despite the dependency because recurrence is core to jyn). Provide validate(rule) for the RRULE body (e.g. FREQ=WEEKLY;BYDAY=MO) and next_occurrence(rule, anchor, after) computing the next date strictly after a given date, anchoring DTSTART at the task''s date. Wire validation so invalid RRULEs are rejected. Unit-test common frequencies/intervals; run just check. Completion/spawn (JOT-0006), the --recur flag (JYN-0009-01), and done handling (JOT-000A) build on this.'
- author: ai:claude@joy delegated-by:horst.schwarz@joydev.com
  date: 2026-05-21T20:42:12.665202Z
  text: '[x] Added jyn-core recurrence module backed by rrule 0.14. validate(rule) parses and builds an RRULE body to reject invalid rules; next_occurrence(rule, anchor, after) returns the next date strictly after a given date (rrule after is inclusive of an exact match, so it takes two and filters > after). Dates anchored at UTC midnight. Unit tests cover daily/weekly/monthly/yearly, intervals, and an exhausted COUNT. just check green.'
