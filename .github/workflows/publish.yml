# Upload workspace crates to crates.io on a version tag push.
# Uses just publish-crates which only touches the registry, not the
# forge release (that is created by the local `joy release publish`
# before this workflow runs). See ADR-032 for the local-first
# release paradigm.
#
# jyn depends on joy-core via crates.io but uses [patch.crates-io]
# locally and joy-core itself path-depends on joy-crypt
# (../crypt/crates/joy-crypt). Standalone tag-driven workflow has
# no umbrella, so we shell-clone the public sibling repos joy and
# crypt next to the workspace before invoking cargo.

name: Publish to crates.io

on:
  push:
    tags:
      # Stable releases only. Pre-release tags like vX.Y.Z-rc1 or vX.Y.Z-test1
      # do not trigger this workflow so they cannot pollute crates.io
      # (published crate versions are permanent, only yankable).
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Clone joyint/joy and joyint/crypt siblings
        run: |
          git clone --depth 1 https://github.com/joyint/joy.git ../joy
          git clone --depth 1 https://github.com/joyint/crypt.git ../crypt

      - uses: dtolnay/rust-toolchain@stable

      - uses: extractions/setup-just@v3

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: just publish-crates
