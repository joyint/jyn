#
# JYN-0003-D0: open a PR to microsoft/winget-pkgs with an updated manifest when
# a stable release is published, pointing at the signed Windows zip asset.
name: Submit to WinGet

on:
  release:
    types: [released]

permissions:
  contents: read

jobs:
  winget:
    runs-on: ubuntu-22.04
    # Skip prereleases; only ship stable versions to winget-pkgs.
    if: ${{ !github.event.release.prerelease }}
    steps:
      # The `released` event fires when the GitHub release is published, but the
      # separate cargo-dist release workflow attaches the signed Windows zip a
      # little later. If the submission runs first, winget-releaser finds no
      # matching asset and invokes komac with an empty `--urls`, which fails.
      # Wait for the asset to appear before submitting (race fix for JYN-0003-D0).
      - name: Wait for the signed Windows asset
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          for i in $(seq 1 60); do
            count=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets \
              --jq '[.assets[].name | select(test("x86_64-pc-windows-msvc\\.zip$"))] | length')
            if [ "${count:-0}" -gt 0 ]; then
              echo "Signed Windows asset present for $TAG."
              exit 0
            fi
            echo "Waiting for the Windows zip on $TAG ($i/60)..."
            sleep 10
          done
          echo "::error::No x86_64-pc-windows-msvc.zip asset on $TAG after 10 minutes."
          exit 1

      - name: Submit jyn to winget-pkgs
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: joyint.jyn
          # Match the signed Windows zip produced by the release workflow.
          installers-regex: 'x86_64-pc-windows-msvc\.zip$'
          # The fork of microsoft/winget-pkgs lives under the joyint org, not
          # under the token owner's personal account.
          fork-user: joyint
          # Classic PAT (public_repo) with write access to joyint/winget-pkgs.
          token: ${{ secrets.WINGET_TOKEN }}
