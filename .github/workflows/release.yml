# Build platform binaries on tag push and attach them to the GitHub
# release. Hand-maintained: cargo-dist is used as a build subroutine
# only (`dist build`), not as the workflow owner. See dist-workspace.toml
# for the matching note. Do NOT regenerate this file via `dist generate`.
#
# Behaviour: if a release for the tag already exists (typically because
# `joy release create --full` answered Y to the forge-release prompt and
# joy created the release first), artifacts are uploaded to it. Otherwise
# the workflow creates the release with auto-generated notes and uploads.
#
# crates.io publishing lives in the separate publish.yml workflow.

name: Release binaries

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

env:
  DIST_VERSION: '0.31.0'

jobs:
  build-local:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: x86_64-apple-darwin
            runner: macos-13
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install dist
        shell: bash
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v${{ env.DIST_VERSION }}/cargo-dist-installer.sh | sh
      - name: Build local artifacts
        shell: bash
        run: dist build --artifacts=local --target=${{ matrix.target }}
      - name: Upload artifacts to workflow
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-local-${{ matrix.target }}
          path: target/distrib/

  build-global:
    name: build (installers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Install dist
        shell: bash
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v${{ env.DIST_VERSION }}/cargo-dist-installer.sh | sh
      - name: Build global artifacts (installer scripts)
        shell: bash
        run: dist build --artifacts=global
      - name: Upload artifacts to workflow
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-global
          path: target/distrib/

  upload:
    name: upload to release
    needs: [build-local, build-global]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect release files
        shell: bash
        run: |
          mkdir -p upload
          # Take only the things humans actually download from a release.
          # cargo-dist scatters dist-manifest.json files we do not want.
          find artifacts -type f \
            \( -name "*.tar.xz" -o -name "*.zip" \
               -o -name "*-installer.sh" -o -name "*-installer.ps1" \
               -o -name "*.sha256" -o -name "sha256.sum" \) \
            -exec mv {} upload/ \;
          ls -la upload/
      - name: Upload to release (create if missing)
        shell: bash
        run: |
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG exists, uploading artifacts..."
            gh release upload "$TAG" upload/* --clobber --repo "${{ github.repository }}"
          else
            echo "Release $TAG does not exist, creating with artifacts..."
            gh release create "$TAG" upload/* \
              --title "$TAG" \
              --generate-notes \
              --repo "${{ github.repository }}"
          fi
