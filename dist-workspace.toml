[workspace]
members = ["cargo:."]

# cargo-dist is used here as a build library only (cross-compile targets
# and installer-script generation). The release workflow itself is
# hand-maintained in .github/workflows/release.yml so that it does not
# conflict with joy's own forge-release step. Do NOT run 'dist init' or
# 'dist generate' against this repo -- the resulting auto-generated
# release.yml would clobber our hand-maintained version.
[dist]
cargo-dist-version = "0.31.0"
# MUST stay "github" -- cargo-dist commands at runtime ('dist host
# --steps=create' inside release.yml) read this to know the CI target;
# an empty list panics with "couldn't find the release!?". Do NOT run
# 'dist generate' against this repo: it would overwrite the patched
# 'Create or update GitHub Release' step in release.yml. To upgrade
# cargo-dist's workflow scaffolding intentionally: run 'dist generate',
# then re-apply the create-or-upload patch (see comment in release.yml).
ci = "github"
# Tell cargo-dist not to fail when release.yml differs from what
# 'dist generate' would emit. We deliberately keep a hand-patched
# 'Create or update GitHub Release' step (create-or-upload semantics)
# instead of the auto-generated 'gh release create' that conflicts with
# joy's own forge-release step. See release.yml comment block.
allow-dirty = ["ci"]
# Installers we still want cargo-dist to produce as build artifacts (the
# hand-written workflow uploads them).
installers = ["shell", "powershell"]
# Where the installer script drops the binary (Linux/macOS). Inside PATH
# on most distributions; the script warns the user and offers to add it
# if missing.
install-path = "~/.local/bin"
# Target platforms to build for (Rust target-triple syntax).
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
